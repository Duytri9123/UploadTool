<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Component Demo</title>
  <link rel="stylesheet" href="/static/dist/css/card-demo-DIyhM0m9.css">
</head>
<body>
  <div class="demo-container">
    <header class="demo-header">
      <h1>Card Component Demo</h1>
      <p>Showcasing the Card component with various configurations</p>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <span class="theme-toggle__icon">🌙</span>
      </button>
    </header>

    <main class="demo-content">
      <!-- Basic Card -->
      <section class="demo-section">
        <h2>Basic Card</h2>
        <div id="basic-card"></div>
      </section>

      <!-- Card with Icon -->
      <section class="demo-section">
        <h2>Card with Icon</h2>
        <div id="icon-card"></div>
      </section>

      <!-- Collapsible Card -->
      <section class="demo-section">
        <h2>Collapsible Card</h2>
        <div id="collapsible-card"></div>
      </section>

      <!-- Card with Header Actions -->
      <section class="demo-section">
        <h2>Card with Header Actions</h2>
        <div id="actions-card"></div>
      </section>

      <!-- Card with Footer -->
      <section class="demo-section">
        <h2>Card with Footer</h2>
        <div id="footer-card"></div>
      </section>

      <!-- Collapsed Card -->
      <section class="demo-section">
        <h2>Initially Collapsed Card</h2>
        <div id="collapsed-card"></div>
      </section>

      <!-- Complex Card -->
      <section class="demo-section">
        <h2>Complex Card (All Features)</h2>
        <div id="complex-card"></div>
      </section>

      <!-- Multiple Cards -->
      <section class="demo-section">
        <h2>Multiple Cards</h2>
        <div class="demo-grid">
          <div id="card-1"></div>
          <div id="card-2"></div>
          <div id="card-3"></div>
        </div>
      </section>
    </main>

    <footer class="demo-footer">
      <p>Card Component - Frontend Architecture Rebuild</p>
    </footer>
  </div>

  <script type="module" src="/static/dist/js/card-demo-clbidFRj.js"></script>
</body>
</html>
