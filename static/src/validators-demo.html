<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validators Demo - TikTok/YouTube Downloader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 0.5rem;
      font-size: 2rem;
    }

    .subtitle {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: 500;
      font-size: 0.9rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    input[type="url"],
    input[type="file"],
    select {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    input.error {
      border-color: #ef4444;
    }

    input.success {
      border-color: #10b981;
    }

    .error-message {
      display: none;
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      display: none;
      color: #10b981;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .success-message.show {
      display: block;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .validation-status {
      margin-top: 2rem;
      padding: 1rem;
      border-radius: 8px;
      background: #f3f4f6;
      display: none;
    }

    .validation-status.show {
      display: block;
    }

    .validation-status h3 {
      margin-bottom: 0.5rem;
      color: #333;
      font-size: 1rem;
    }

    .validation-status ul {
      list-style: none;
      padding-left: 0;
    }

    .validation-status li {
      padding: 0.5rem;
      margin-bottom: 0.25rem;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    .validation-status li.valid {
      background: #d1fae5;
      color: #065f46;
    }

    .validation-status li.invalid {
      background: #fee2e2;
      color: #991b1b;
    }

    .demo-section {
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid #e0e0e0;
    }

    .demo-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }

    .demo-section h2 {
      color: #667eea;
      margin-bottom: 1rem;
      font-size: 1.5rem;
    }

    .file-info {
      margin-top: 0.5rem;
      padding: 0.75rem;
      background: #f3f4f6;
      border-radius: 6px;
      font-size: 0.85rem;
      display: none;
    }

    .file-info.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 Validators Demo</h1>
    <p class="subtitle">Real-time form validation with debouncing</p>

    <!-- URL Validation Demo -->
    <div class="demo-section">
      <h2>URL Validation</h2>
      
      <div class="form-group">
        <label for="general-url">General URL</label>
        <input type="url" id="general-url" placeholder="https://example.com">
        <div class="error-message" id="general-url-error"></div>
        <div class="success-message" id="general-url-success">✓ Valid URL</div>
      </div>

      <div class="form-group">
        <label for="tiktok-url">TikTok URL</label>
        <input type="url" id="tiktok-url" placeholder="https://www.tiktok.com/@user/video/123">
        <div class="error-message" id="tiktok-url-error"></div>
        <div class="success-message" id="tiktok-url-success">✓ Valid TikTok URL</div>
      </div>

      <div class="form-group">
        <label for="youtube-url">YouTube URL</label>
        <input type="url" id="youtube-url" placeholder="https://www.youtube.com/watch?v=abc123">
        <div class="error-message" id="youtube-url-error"></div>
        <div class="success-message" id="youtube-url-success">✓ Valid YouTube URL</div>
      </div>
    </div>

    <!-- Form Field Validation Demo -->
    <div class="demo-section">
      <h2>Form Field Validation</h2>
      
      <div class="form-group">
        <label for="username">Username (Required)</label>
        <input type="text" id="username" placeholder="Enter username">
        <div class="error-message" id="username-error"></div>
        <div class="success-message" id="username-success">✓ Valid username</div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="user@example.com">
        <div class="error-message" id="email-error"></div>
        <div class="success-message" id="email-success">✓ Valid email</div>
      </div>

      <div class="form-group">
        <label for="age">Age (18-100)</label>
        <input type="number" id="age" placeholder="25" min="18" max="100">
        <div class="error-message" id="age-error"></div>
        <div class="success-message" id="age-success">✓ Valid age</div>
      </div>
    </div>

    <!-- File Validation Demo -->
    <div class="demo-section">
      <h2>File Validation</h2>
      
      <div class="form-group">
        <label for="image-file">Image File (JPEG/PNG, max 5MB)</label>
        <input type="file" id="image-file" accept="image/jpeg,image/png">
        <div class="error-message" id="image-file-error"></div>
        <div class="success-message" id="image-file-success">✓ Valid file</div>
        <div class="file-info" id="image-file-info"></div>
      </div>
    </div>

    <!-- Complete Form Demo -->
    <div class="demo-section">
      <h2>Complete Form Validation</h2>
      
      <form id="demo-form">
        <div class="form-group">
          <label for="form-url">Video URL (Required)</label>
          <input type="url" id="form-url" placeholder="https://www.tiktok.com/@user/video/123">
          <div class="error-message" id="form-url-error"></div>
        </div>

        <div class="form-group">
          <label for="form-quality">Quality (Required)</label>
          <select id="form-quality">
            <option value="">Select quality</option>
            <option value="720p">720p</option>
            <option value="1080p">1080p</option>
            <option value="4k">4K</option>
          </select>
          <div class="error-message" id="form-quality-error"></div>
        </div>

        <button type="submit" id="submit-button">Validate Form</button>
      </form>

      <div class="validation-status" id="validation-status">
        <h3>Validation Results:</h3>
        <ul id="validation-results"></ul>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      validateURL,
      validateTikTokURL,
      validateYouTubeURL,
      validateRequired,
      validateEmail,
      validateNumberRange,
      validateFile,
      validateForm,
      isFormValid,
      getValidationErrors,
      attachValidator
    } from './modules/validators.js';

    // Helper function to show validation result
    function showValidationResult(inputId, result) {
      const input = document.getElementById(inputId);
      const errorElement = document.getElementById(`${inputId}-error`);
      const successElement = document.getElementById(`${inputId}-success`);

      if (!result.valid) {
        input.classList.add('error');
        input.classList.remove('success');
        errorElement.textContent = result.error;
        errorElement.classList.add('show');
        successElement.classList.remove('show');
      } else {
        input.classList.remove('error');
        input.classList.add('success');
        errorElement.classList.remove('show');
        successElement.classList.add('show');
      }
    }

    // URL Validation
    attachValidator(
      document.getElementById('general-url'),
      validateURL,
      (result) => showValidationResult('general-url', result),
      300
    );

    attachValidator(
      document.getElementById('tiktok-url'),
      validateTikTokURL,
      (result) => showValidationResult('tiktok-url', result),
      300
    );

    attachValidator(
      document.getElementById('youtube-url'),
      validateYouTubeURL,
      (result) => showValidationResult('youtube-url', result),
      300
    );

    // Form Field Validation
    attachValidator(
      document.getElementById('username'),
      (value) => validateRequired(value, 'Username'),
      (result) => showValidationResult('username', result),
      300
    );

    attachValidator(
      document.getElementById('email'),
      validateEmail,
      (result) => showValidationResult('email', result),
      300
    );

    attachValidator(
      document.getElementById('age'),
      (value) => validateNumberRange(value, 18, 100, 'Age'),
      (result) => showValidationResult('age', result),
      300
    );

    // File Validation
    document.getElementById('image-file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const result = validateFile(file, {
        allowedTypes: ['image/jpeg', 'image/png'],
        maxSize: 5 * 1024 * 1024  // 5MB
      });

      showValidationResult('image-file', result);

      // Show file info
      const fileInfo = document.getElementById('image-file-info');
      if (result.valid) {
        fileInfo.innerHTML = `
          <strong>File:</strong> ${file.name}<br>
          <strong>Type:</strong> ${file.type}<br>
          <strong>Size:</strong> ${(file.size / 1024).toFixed(2)} KB
        `;
        fileInfo.classList.add('show');
      } else {
        fileInfo.classList.remove('show');
      }
    });

    // Complete Form Validation
    document.getElementById('demo-form').addEventListener('submit', (e) => {
      e.preventDefault();

      const fields = {
        url: document.getElementById('form-url').value,
        quality: document.getElementById('form-quality').value
      };

      const rules = {
        url: { required: true, url: true },
        quality: { required: true }
      };

      const results = validateForm(fields, rules);
      const errors = getValidationErrors(results);

      // Show field errors
      Object.keys(rules).forEach(field => {
        const errorElement = document.getElementById(`form-${field}-error`);
        if (errors[field]) {
          errorElement.textContent = errors[field];
          errorElement.classList.add('show');
          document.getElementById(`form-${field}`).classList.add('error');
        } else {
          errorElement.classList.remove('show');
          document.getElementById(`form-${field}`).classList.remove('error');
        }
      });

      // Show validation status
      const statusElement = document.getElementById('validation-status');
      const resultsElement = document.getElementById('validation-results');
      
      resultsElement.innerHTML = Object.entries(results)
        .map(([field, result]) => {
          const className = result.valid ? 'valid' : 'invalid';
          const icon = result.valid ? '✓' : '✗';
          const message = result.valid ? 'Valid' : result.error;
          return `<li class="${className}">${icon} ${field}: ${message}</li>`;
        })
        .join('');
      
      statusElement.classList.add('show');

      if (isFormValid(results)) {
        alert('Form is valid! Ready to submit.');
      }
    });
  </script>
</body>
</html>
