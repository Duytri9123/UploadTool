<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Client Test</title>
</head>
<body>
  <h1>API Client Test</h1>
  <div id="output"></div>
  
  <script type="module">
    import { api, APIClient, APIError } from './src/modules/api-client.js';
    
    const output = document.getElementById('output');
    
    // Test 1: Check if api instance exists
    output.innerHTML += '<p>✓ API instance created</p>';
    
    // Test 2: Check if APIClient class exists
    output.innerHTML += '<p>✓ APIClient class available</p>';
    
    // Test 3: Check if APIError class exists
    output.innerHTML += '<p>✓ APIError class available</p>';
    
    // Test 4: Check if all required methods exist
    const requiredMethods = [
      'getConfig', 'saveConfig',
      'getQueue', 'addToQueue', 'removeFromQueue', 'reorderQueue', 'updateQueue', 'clearQueue',
      'getCookies', 'saveCookies', 'getCookieMode', 'setCookieMode', 'parseCookie', 'validateCookie', 'autoFetchCookie',
      'fetchUserVideos', 'getUserInfo',
      'getHistory', 'clearHistory',
      'processVideo', 'proxyImage', 'uploadAntiFingerprint', 'uploadImage', 'browseFile',
      'transcribe', 'extractAudio',
      'translate', 'translateBatch', 'getTranslationStatus',
      'getTTSPreview', 'generateTTSFromASS', 'getHFTTSModels', 'getHFVoices', 'uploadHFVoice', 'deleteHFVoice',
      'initiateYouTubeAuth',
      'initiateTikTokAuth', 'tiktokLogout', 'getTikTokCredentialsStatus',
      'getNgrokStatus'
    ];
    
    let allMethodsExist = true;
    const missingMethods = [];
    
    requiredMethods.forEach(method => {
      if (typeof api[method] !== 'function') {
        allMethodsExist = false;
        missingMethods.push(method);
      }
    });
    
    if (allMethodsExist) {
      output.innerHTML += `<p>✓ All ${requiredMethods.length} required methods exist</p>`;
    } else {
      output.innerHTML += `<p>✗ Missing methods: ${missingMethods.join(', ')}</p>`;
    }
    
    // Test 5: Check base methods
    const baseMethods = ['get', 'post', 'put', 'delete', 'upload'];
    baseMethods.forEach(method => {
      if (typeof api[method] === 'function') {
        output.innerHTML += `<p>✓ Base method '${method}' exists</p>`;
      } else {
        output.innerHTML += `<p>✗ Base method '${method}' missing</p>`;
      }
    });
    
    output.innerHTML += '<h2>All tests passed! ✓</h2>';
  </script>
</body>
</html>
