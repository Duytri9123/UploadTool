<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogBox Component Demo</title>
  <link rel="stylesheet" href="/static/dist/main.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--color-bg);
      color: var(--color-text);
      transition: background-color 200ms, color 200ms;
    }

    .demo-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .demo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--color-border);
    }

    .demo-header h1 {
      margin: 0;
      font-size: 2rem;
      color: var(--color-text);
    }

    .demo-controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .control-group {
      background-color: var(--color-card-bg);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
    }

    .control-group h3 {
      margin: 0 0 15px 0;
      font-size: 1rem;
      color: var(--color-text);
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .demo-logbox {
      margin-bottom: 30px;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      padding: 15px;
      background-color: var(--color-bg-secondary);
      border-radius: 8px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--color-text);
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-item label {
      cursor: pointer;
      user-select: none;
    }

    .select-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .select-group select {
      padding: 8px 12px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background-color: var(--color-bg);
      color: var(--color-text);
      font-size: 0.875rem;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .demo-controls {
        grid-template-columns: 1fr;
      }

      .demo-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }

      .stats {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <div class="demo-header">
      <h1>LogBox Component Demo</h1>
      <button id="theme-toggle" class="button button--secondary button--small">
        Toggle Theme
      </button>
    </div>

    <div class="demo-controls">
      <!-- Add Log Controls -->
      <div class="control-group">
        <h3>Add Logs</h3>
        <div class="button-group">
          <button id="add-info" class="button button--primary button--small">Add Info</button>
          <button id="add-success" class="button button--success button--small">Add Success</button>
          <button id="add-warning" class="button button--secondary button--small">Add Warning</button>
          <button id="add-error" class="button button--danger button--small">Add Error</button>
        </div>
        <div class="button-group" style="margin-top: 10px;">
          <button id="add-multiple" class="button button--ghost button--small">Add 10 Random</button>
          <button id="add-many" class="button button--ghost button--small">Add 100 Random</button>
        </div>
      </div>

      <!-- Filter Controls -->
      <div class="control-group">
        <h3>Filter Levels</h3>
        <div class="checkbox-group">
          <div class="checkbox-item">
            <input type="checkbox" id="filter-info" checked>
            <label for="filter-info">Info</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="filter-success" checked>
            <label for="filter-success">Success</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="filter-warning" checked>
            <label for="filter-warning">Warning</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="filter-error" checked>
            <label for="filter-error">Error</label>
          </div>
        </div>
      </div>

      <!-- Display Controls -->
      <div class="control-group">
        <h3>Display Options</h3>
        <div class="select-group">
          <label>Density:</label>
          <select id="density-select">
            <option value="comfortable" selected>Comfortable</option>
            <option value="compact">Compact</option>
          </select>
        </div>
        <div class="checkbox-group" style="margin-top: 10px;">
          <div class="checkbox-item">
            <input type="checkbox" id="auto-scroll" checked>
            <label for="auto-scroll">Auto-scroll</label>
          </div>
        </div>
      </div>

      <!-- Action Controls -->
      <div class="control-group">
        <h3>Actions</h3>
        <div class="button-group">
          <button id="scroll-top" class="button button--ghost button--small">Scroll to Top</button>
          <button id="scroll-bottom" class="button button--ghost button--small">Scroll to Bottom</button>
        </div>
        <div class="button-group" style="margin-top: 10px;">
          <button id="copy-logs" class="button button--secondary button--small">Copy to Clipboard</button>
          <button id="download-logs" class="button button--secondary button--small">Download Logs</button>
          <button id="clear-logs" class="button button--danger button--small">Clear All</button>
        </div>
      </div>
    </div>

    <!-- LogBox Component -->
    <div class="demo-logbox" id="logbox-container"></div>

    <!-- Statistics -->
    <div class="stats">
      <div class="stat-item">
        <span class="stat-label">Total Logs</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Info</span>
        <span class="stat-value" id="stat-info">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Success</span>
        <span class="stat-value" id="stat-success">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Warning</span>
        <span class="stat-value" id="stat-warning">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Error</span>
        <span class="stat-value" id="stat-error">0</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { LogBox } from '/static/src/components/LogBox/LogBox.js';
    import { Button } from '/static/src/components/Button/Button.js';

    // Sample log messages
    const sampleMessages = {
      info: [
        'Application started successfully',
        'Loading configuration from config.yml',
        'Connecting to database...',
        'User session initialized',
        'Cache cleared successfully',
        'Processing request...',
        'Fetching data from API...',
        'Initializing modules...'
      ],
      success: [
        'Video processed successfully',
        'File uploaded to server',
        'Configuration saved',
        'Database connection established',
        'Authentication successful',
        'Task completed',
        'Export finished',
        'Backup created successfully'
      ],
      warning: [
        'Low disk space detected',
        'API rate limit approaching',
        'Deprecated function used',
        'Cache miss - fetching from source',
        'Slow network connection',
        'Missing optional configuration',
        'Using fallback method',
        'Session about to expire'
      ],
      error: [
        'Failed to connect to server',
        'Invalid API response',
        'File not found',
        'Permission denied',
        'Database query failed',
        'Network timeout',
        'Invalid credentials',
        'Out of memory'
      ]
    };

    // Initialize LogBox
    const logBox = new LogBox({
      maxEntries: 1000,
      autoScroll: true,
      density: 'comfortable',
      showTimestamp: true,
      timestampFormat: 'time',
      onLogAdded: updateStats,
      onCleared: updateStats,
      onFilterChanged: updateStats
    });

    // Mount LogBox
    const container = document.getElementById('logbox-container');
    logBox.mount(container);

    // Add initial welcome message
    logBox.addLog('info', 'LogBox Demo initialized. Try adding some logs!');

    // Update statistics
    function updateStats() {
      document.getElementById('stat-total').textContent = logBox.getLogCount();
      document.getElementById('stat-info').textContent = logBox.getLogCount('info');
      document.getElementById('stat-success').textContent = logBox.getLogCount('success');
      document.getElementById('stat-warning').textContent = logBox.getLogCount('warning');
      document.getElementById('stat-error').textContent = logBox.getLogCount('error');
    }

    // Get random message for level
    function getRandomMessage(level) {
      const messages = sampleMessages[level];
      return messages[Math.floor(Math.random() * messages.length)];
    }

    // Add log buttons
    document.getElementById('add-info').addEventListener('click', () => {
      logBox.addLog('info', getRandomMessage('info'));
    });

    document.getElementById('add-success').addEventListener('click', () => {
      logBox.addLog('success', getRandomMessage('success'));
    });

    document.getElementById('add-warning').addEventListener('click', () => {
      logBox.addLog('warning', getRandomMessage('warning'));
    });

    document.getElementById('add-error').addEventListener('click', () => {
      logBox.addLog('error', getRandomMessage('error'));
    });

    document.getElementById('add-multiple').addEventListener('click', () => {
      const levels = ['info', 'success', 'warning', 'error'];
      for (let i = 0; i < 10; i++) {
        const level = levels[Math.floor(Math.random() * levels.length)];
        logBox.addLog(level, getRandomMessage(level));
      }
    });

    document.getElementById('add-many').addEventListener('click', () => {
      const levels = ['info', 'success', 'warning', 'error'];
      for (let i = 0; i < 100; i++) {
        const level = levels[Math.floor(Math.random() * levels.length)];
        logBox.addLog(level, getRandomMessage(level));
      }
    });

    // Filter controls
    const filterCheckboxes = {
      info: document.getElementById('filter-info'),
      success: document.getElementById('filter-success'),
      warning: document.getElementById('filter-warning'),
      error: document.getElementById('filter-error')
    };

    Object.entries(filterCheckboxes).forEach(([level, checkbox]) => {
      checkbox.addEventListener('change', () => {
        logBox.toggleLevel(level);
      });
    });

    // Display controls
    document.getElementById('density-select').addEventListener('change', (e) => {
      logBox.setDensity(e.target.value);
    });

    document.getElementById('auto-scroll').addEventListener('change', (e) => {
      logBox.setAutoScroll(e.target.checked);
    });

    // Action controls
    document.getElementById('scroll-top').addEventListener('click', () => {
      logBox.scrollToTop();
    });

    document.getElementById('scroll-bottom').addEventListener('click', () => {
      logBox.scrollToBottom();
    });

    document.getElementById('copy-logs').addEventListener('click', async () => {
      const success = await logBox.copyToClipboard();
      if (success) {
        logBox.addLog('success', 'Logs copied to clipboard');
      } else {
        logBox.addLog('error', 'Failed to copy logs to clipboard');
      }
    });

    document.getElementById('download-logs').addEventListener('click', () => {
      const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
      logBox.downloadLogs(`logs-${timestamp}.txt`);
      logBox.addLog('success', 'Logs downloaded successfully');
    });

    document.getElementById('clear-logs').addEventListener('click', () => {
      if (confirm('Are you sure you want to clear all logs?')) {
        logBox.clearLogs();
        logBox.addLog('info', 'Logs cleared');
      }
    });

    // Theme toggle
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });

    // Initialize theme from localStorage
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);

    // Initial stats update
    updateStats();
  </script>
</body>
</html>
