{% extends "base.html" %}
{% block title %}User Search — Douyin Downloader{% endblock %}
{% block content %}
<div class="card">
  <div class="card-title">Search User by URL</div>
  <div class="form-group">
    <label>Douyin User URL</label>
    <input id="user-url" type="text" placeholder="https://www.douyin.com/user/MS4wLj..."
           onkeydown="if(event.key==='Enter') searchUser()">
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-search" onclick="searchUser()">🔍 Fetch User Info</button>
  </div>
</div>

<!-- loading -->
<div id="user-loading" style="display:none" class="card">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="elapsed" id="elapsed-timer">0.0s</div>
    <div class="loading-bar-wrap">
      <div style="font-size:12px;color:var(--dim);margin-bottom:6px;text-align:center" id="loading-label">Connecting…</div>
      <div class="loading-bar"><div class="loading-bar-fill" id="loading-bar-fill"></div></div>
    </div>
  </div>
</div>

<!-- user card -->
<div id="user-result" style="display:none" class="card">
  <div class="card-title">User Info</div>
  <div class="user-card">
    <div id="user-avatar-wrap"><div class="user-avatar-placeholder">👤</div></div>
    <div class="user-info">
      <h3 id="u-name">—</h3>
      <p id="u-sig" style="max-width:500px;word-break:break-word;margin-bottom:10px">—</p>
      <div class="user-stats">
        <div class="user-stat"><div class="num" id="u-aweme">0</div><div class="lbl">Videos</div></div>
        <div class="user-stat"><div class="num" id="u-follower">0</div><div class="lbl">Followers</div></div>
        <div class="user-stat"><div class="num" id="u-following">0</div><div class="lbl">Following</div></div>
      </div>
      <div class="user-actions">
        <button class="btn btn-success btn-sm" onclick="addUserToConfig()">➕ Add to Config</button>
        <button class="btn btn-primary btn-sm" onclick="downloadUser()">⬇ Download All</button>
      </div>
    </div>
  </div>
</div>

<!-- video section -->
<div id="user-videos" style="display:none" class="card">
  <!-- toolbar -->
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">
    <div class="card-title" style="margin:0;flex:1">
      Videos <span id="video-count" style="color:var(--dim);font-weight:400"></span>
      <span id="load-status" style="font-size:11px;color:var(--cyan);margin-left:8px"></span>
    </div>
    <!-- filter -->
    <select id="filter-type" onchange="applyFilter()" style="width:110px;padding:6px 10px;font-size:12px">
      <option value="all">All types</option>
      <option value="video">Video only</option>
      <option value="gallery">Gallery only</option>
    </select>
    <select id="filter-sort" onchange="applyFilter()" style="width:130px;padding:6px 10px;font-size:12px">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="most_play">Most played</option>
      <option value="most_like">Most liked</option>
    </select>
    <input id="filter-search" type="text" placeholder="🔎 Search title…"
           oninput="applyFilter()" style="width:160px;padding:6px 10px;font-size:12px">
    <!-- select actions -->
    <button class="btn btn-ghost btn-sm" onclick="selectAll()">☑ All</button>
    <button class="btn btn-ghost btn-sm" onclick="selectNone()">☐ None</button>
    <button class="btn btn-primary btn-sm" id="btn-dl-selected" onclick="downloadSelected()" style="display:none">
      ⬇ Download Selected (<span id="sel-count">0</span>)
    </button>
    <button class="btn btn-ghost btn-sm" id="btn-load-more" onclick="loadMoreVideos()" style="display:none">
      ⬇ Load More
    </button>
  </div>

  <!-- loading bar for video fetch -->
  <div id="video-load-bar" style="display:none;margin-bottom:12px">
    <div class="progress-label">
      <span id="video-load-label">Loading videos…</span>
      <span id="video-load-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="pb-video-load"></div></div>
  </div>

  <div class="video-grid" id="video-grid"></div>

  <!-- sentinel NGOÀI grid để IntersectionObserver hoạt động -->
  <div id="scroll-sentinel" style="height:20px;margin-top:8px"></div>
  <div id="page-spinner" style="display:none;text-align:center;padding:16px;gap:10px;align-items:center">
    <div class="spinner" style="width:24px;height:24px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:8px"></div>
    <span style="font-size:13px;color:var(--dim);vertical-align:middle">Loading more…</span>
  </div>
</div>

<div id="user-error" style="display:none;color:var(--red);font-size:13px;padding:8px 0"></div>
{% endblock %}
{% block scripts %}
<script src="/static/js/pages/user.js"></script>
{% endblock %}
