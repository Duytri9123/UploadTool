{% extends "base.html" %}
{% block title %}Transcribe — Douyin Downloader{% endblock %}
{% block content %}
<div class="card">
  <div class="card-title">Source</div>
  <div class="form-row cols-2">
    <div class="form-group"><label>Video Folder</label><input id="tr-dir" type="text" value="./Downloaded"></div>
    <div class="form-group"><label>Single File (optional)</label><input id="tr-file" type="text" placeholder="path/to/video.mp4"></div>
  </div>
</div>

<div class="card">
  <div class="card-title">Options</div>
  <div class="form-row cols-4">
    <div class="form-group">
      <label>Model</label>
      <select id="tr-model">
        <option>tiny</option><option selected>base</option>
        <option>small</option><option>medium</option><option>large</option>
      </select>
    </div>
    <div class="form-group"><label>Language</label><input id="tr-lang" type="text" value="zh"></div>
    <div class="form-group"><label>Output Dir</label><input id="tr-out" type="text" value="./transcripts"></div>
  </div>
  <div class="check-group" style="margin-top:8px">
    <label class="check-item"><input type="checkbox" id="tr-srt"> Output SRT</label>
    <label class="check-item"><input type="checkbox" id="tr-skip" checked> Skip existing</label>
    <label class="check-item"><input type="checkbox" id="tr-sc"> Traditional→Simplified (OpenCC)</label>
  </div>
</div>

<div class="card">
  <div class="card-title">Progress</div>
  <div class="progress-wrap">
    <div class="progress-label"><span>Overall</span><span id="lbl-tr-overall">—</span></div>
    <div class="progress-bar"><div class="progress-fill" id="pb-tr-overall"></div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span>File</span><span id="lbl-tr-file">—</span></div>
    <div class="progress-bar"><div class="progress-fill" id="pb-tr-file"></div></div>
  </div>
  <div class="log-box" id="tr-log" style="height:200px;margin-top:10px"></div>
</div>

<div class="btn-row">
  <button class="btn btn-primary" id="btn-tr" onclick="startTranscribe()">▶ Start Transcribe</button>
  <button class="btn btn-ghost" onclick="clearLog('tr-log')">🗑 Clear</button>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/pages/transcribe.js"></script>
{% endblock %}
