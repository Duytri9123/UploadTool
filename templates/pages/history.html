{% extends "base.html" %}
{% block title %}History — Douyin Downloader{% endblock %}
{% block content %}
<div class="card">
  <div class="btn-row" style="margin-top:0">
    <button class="btn btn-ghost"   onclick="loadHistory()">🔄 Refresh</button>
    <button class="btn btn-danger"  onclick="clearHistory()">🗑 Clear All</button>
  </div>
  <div class="table-wrap" style="margin-top:14px">
    <table>
      <thead>
        <tr><th>Time</th><th>URL</th><th>Type</th><th>Total</th><th>Success</th></tr>
      </thead>
      <tbody id="history-body">
        <tr><td colspan="5" style="color:var(--dim);text-align:center">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/pages/history.js"></script>
{% endblock %}
