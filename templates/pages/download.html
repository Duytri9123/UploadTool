{% extends "base.html" %}
{% block title %}Download — Douyin Downloader{% endblock %}
{% block head %}
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
.queue-item{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--surf2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;
  transition:.2s;cursor:grab}
.queue-item:hover{border-color:var(--accent)}
.queue-item.downloading{border-color:var(--cyan);background:rgba(6,182,212,.08)}
.queue-item.done{opacity:.4}
.queue-thumb{width:36px;height:48px;object-fit:cover;border-radius:4px;background:var(--surf3);flex-shrink:0}
.queue-thumb-ph{width:36px;height:48px;border-radius:4px;background:var(--surf3);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.queue-desc{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.queue-date{font-size:11px;color:var(--dim);flex-shrink:0}
.queue-status{font-size:11px;width:70px;text-align:right;flex-shrink:0}
.queue-drag{color:var(--dim);cursor:grab;font-size:16px;flex-shrink:0}
.queue-remove{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;
  padding:2px 6px;border-radius:4px;flex-shrink:0}
.queue-remove:hover{color:var(--red);background:rgba(239,68,68,.1)}
.priority-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;
  padding:2px 5px;border-radius:4px}
.priority-btn:hover{color:var(--accent2);background:var(--surf)}
.empty-queue{text-align:center;padding:32px;color:var(--dim);font-size:13px}
</style>
{% endblock %}
{% block content %}
<div style="display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start">

  <!-- left: progress + log -->
  <div>
    <div class="card">
      <div class="card-title">Progress</div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Overall</span><span id="lbl-overall">—</span></div>
        <div class="progress-bar"><div class="progress-fill" id="pb-overall"></div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Step</span><span id="lbl-step">—</span></div>
        <div class="progress-bar"><div class="progress-fill" id="pb-step"></div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Items</span><span id="lbl-item">—</span></div>
        <div class="progress-bar"><div class="progress-fill" id="pb-item"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Log</div>
      <div class="log-box" id="dl-log" style="height:320px"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btn-dl" onclick="startQueueDownload()">▶ Start Download</button>
      <button class="btn btn-ghost" onclick="clearLog('dl-log')">🗑 Clear Log</button>
    </div>
  </div>

  <!-- right: queue -->
  <div class="card" style="position:sticky;top:72px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="card-title" style="margin:0">
        Queue <span id="queue-count" style="color:var(--dim);font-weight:400">(0)</span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="clearQueue()">🗑 Clear</button>
      </div>
    </div>

    <!-- manual URL add -->
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <input id="manual-url" type="text" placeholder="Add URL manually…"
             style="flex:1;font-size:12px;padding:6px 10px"
             onkeydown="if(event.key==='Enter') addManualUrl()">
      <button class="btn btn-ghost btn-sm" onclick="addManualUrl()">＋</button>
    </div>

    <div id="queue-list">
      <div class="empty-queue">No items in queue.<br>Select videos from User Search.</div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/socket.js"></script>
<script src="/static/js/pages/download.js"></script>
{% endblock %}
