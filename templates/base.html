<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Douyin Downloader{% endblock %}</title>
<link rel="stylesheet" href="/static/css/main.css">
<link rel="stylesheet" href="/static/css/components.css">
{% block head %}{% endblock %}
</head>
<body>
<div class="header">
  <span style="font-size:22px">🎵</span>
  <h1>Douyin Downloader</h1>
  <span class="badge">v2.0.0</span>
</div>
<div class="layout">
  <nav class="sidebar">
    <a class="nav-item {% if active=='config'     %}active{% endif %}" href="/config">
      <span class="icon">⚙️</span>Config</a>
    <a class="nav-item {% if active=='cookies'    %}active{% endif %}" href="/cookies">
      <span class="icon">🍪</span>Cookies</a>
    <a class="nav-item {% if active=='download'   %}active{% endif %}" href="/download">
      <span class="icon">⬇️</span>Download</a>
    <a class="nav-item {% if active=='user'       %}active{% endif %}" href="/user">
      <span class="icon">🔍</span>User Search</a>
    <a class="nav-item {% if active=='transcribe' %}active{% endif %}" href="/transcribe">
      <span class="icon">🎙️</span>Transcribe</a>
    <a class="nav-item {% if active=='history'    %}active{% endif %}" href="/history">
      <span class="icon">🗄️</span>History</a>
  </nav>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
</div>
<div class="toast-container" id="toasts"></div>
<script src="/static/js/api.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
