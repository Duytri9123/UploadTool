      <!-- PAGE: USER SEARCH -->
      <div id="page-user" class="page">
        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="title_user">Tìm người dùng</span>
          </div>
          <div class="field">
            <label data-i18n="nav_user">Tìm người dùng</label>
            <input type="text" id="user-url" data-i18n="search_placeholder" data-i18n-attr="placeholder" placeholder="https://www.douyin.com/user/...">
          </div>

          <!-- Provider bar -->
          <div class="provider-bar">
            <span id="current-provider-badge" class="flex-center gap-8">
              <span class="dot dot-yellow"></span>Loading...
            </span>
            <label data-i18n="lbl_translate_provider" style="margin:0">Dịch bằng</label>
            <select id="provider-select">
              <option value="auto">Auto (Server)</option>
              <option value="deepseek">DeepSeek</option>
              <option value="openai">OpenAI</option>
              <option value="huggingface">HuggingFace</option>
              <option value="google">Google</option>
            </select>
            <button class="btn btn-secondary btn-sm" onclick="retranslateAll()" data-i18n="lbl_retranslate">Dịch lại</button>
          </div>

          <div class="btn-group mt-8">
            <button class="btn btn-primary" id="btn-search" onclick="searchUser()" data-i18n="btn_search">Tìm kiếm</button>
            <label class="toggle-wrap" style="margin-left:auto">
              <input type="checkbox" class="toggle-input" id="toggle-vi" checked>
              <div class="toggle"></div>
              <span class="toggle-label text-sm" data-i18n="lbl_vi_toggle">Tiếng Việt</span>
            </label>
          </div>
        </div>

        <div id="user-loading" class="hidden" style="text-align:center;padding:32px;color:var(--text2)">
          <div class="spinner" style="width:28px;height:28px;border-width:3px;margin:0 auto 12px"></div>
          <div data-i18n="lbl_loading_user">Đang tải dữ liệu người dùng...</div>
        </div>

        <div id="user-result" class="hidden">
          <div class="user-card">
            <div id="u-avatar"><div class="user-avatar-ph">?</div></div>
            <div class="user-info">
              <div class="user-name" id="u-name">--</div>
              <div class="user-name-vi text-sm" id="u-name-vi"></div>
              <div class="user-sig text-sm text-muted" id="u-sig"></div>
              <div class="user-sig text-sm" id="u-sig-vi" style="color:var(--cyan)"></div>
              <div class="user-stats mt-8">
                <div class="user-stat"><div class="user-stat-val" id="u-posts">0</div><div class="user-stat-lbl" data-i18n="lbl_posts">Bài đăng</div></div>
                <div class="user-stat"><div class="user-stat-val" id="u-followers">0</div><div class="user-stat-lbl" data-i18n="lbl_followers">Người theo dõi</div></div>
                <div class="user-stat"><div class="user-stat-val" id="u-following">0</div><div class="user-stat-lbl" data-i18n="lbl_following">Đang theo dõi</div></div>
              </div>
            </div>
          </div>
        </div>

        <div id="user-videos-section" class="hidden">
          <div class="card">
            <div class="card-header">
              <span class="card-title"><span data-i18n="lbl_videos">Video</span> (<span id="video-count">0</span>)</span>
              <div class="card-actions">
                <span class="text-xs text-muted" id="load-status"></span>
              </div>
            </div>
            <div class="grid-4 mb-12">
              <div class="field">
                <label data-i18n="lbl_type">Loại</label>
                <select id="filter-type">
                  <option value="all" data-i18n="lbl_filter_all">Tất cả</option>
                  <option value="video" data-i18n="lbl_filter_video">Video</option>
                  <option value="gallery" data-i18n="lbl_filter_gallery">Ảnh</option>
                </select>
              </div>
              <div class="field">
                <label data-i18n="lbl_sort">Sắp xếp</label>
                <select id="filter-sort">
                  <option value="newest" data-i18n="lbl_sort_newest">Mới nhất</option>
                  <option value="oldest" data-i18n="lbl_sort_oldest">Cũ nhất</option>
                  <option value="most_play" data-i18n="lbl_sort_play">Xem nhiều nhất</option>
                  <option value="most_like" data-i18n="lbl_sort_like">Thích nhiều nhất</option>
                </select>
              </div>
              <div class="field" style="grid-column:span 2">
                <label data-i18n="lbl_search_title">Tìm tiêu đề</label>
                <input type="text" id="filter-search" data-i18n="lbl_search_title" data-i18n-attr="placeholder" placeholder="Tìm tiêu đề...">
              </div>
            </div>
            <div class="flex-center gap-8 mb-12">
              <button class="btn btn-secondary btn-sm" onclick="selectAll()" data-i18n="btn_select_all">Chọn tất cả</button>
              <button class="btn btn-secondary btn-sm" onclick="selectNone()" data-i18n="btn_clear_sel">Bỏ chọn</button>
              <span class="text-sm text-muted"><span id="sel-count">0</span> <span data-i18n="lbl_selected">đã chọn</span></span>
              <button class="btn btn-primary btn-sm hidden" id="btn-dl-selected" onclick="downloadSelected()" data-i18n="btn_add_queue">Thêm vào hàng chờ</button>
            </div>
            <div id="video-grid"></div>
            <div class="pagination">
              <button class="btn btn-secondary btn-sm" id="btn-prev" onclick="goPrev()" disabled data-i18n="btn_prev">Trước</button>
              <span class="page-info" id="page-info">Trang 1 / 1</span>
              <input type="number" id="page-jump" min="1" value="1" class="page-jump-input" aria-label="Page number">
              <button class="btn btn-secondary btn-sm" onclick="goToPage()" data-i18n="btn_go_page">Đi</button>
              <button class="btn btn-secondary btn-sm" id="btn-next" onclick="goNext()" data-i18n="btn_next">Tiếp</button>
            </div>
          </div>
        </div>
      </div>
