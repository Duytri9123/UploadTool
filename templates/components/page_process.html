      <!-- PAGE: VIDEO PROCESSING -->
      <div id="page-process" class="page">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start">
          <div>
            <div class="card">
              <div class="card-header"><span class="card-title" data-i18n="lbl_process_settings">Cai dat xu ly video</span></div>
              <div class="field">
                <label data-i18n="lbl_video_file">File video</label>
                <input type="text" id="proc-video" placeholder="./Downloaded/.../video.mp4">
              </div>
              <div class="field">
                <label data-i18n="lbl_output_dir">Thu muc xuat</label>
                <input type="text" id="proc-out" placeholder="De trong = cung thu muc video">
              </div>
              <div class="grid-2">
                <div class="field">
                  <label data-i18n="lbl_model">Mo hinh Whisper</label>
                  <select id="proc-model">
                    <option value="tiny">tiny (nhanh nhat)</option>
                    <option value="base" selected>base</option>
                    <option value="small">small</option>
                    <option value="medium">medium</option>
                    <option value="large">large (tot nhat)</option>
                  </select>
                </div>
                <div class="field">
                  <label data-i18n="lbl_language">Ngon ngu goc</label>
                  <select id="proc-lang">
                    <option value="zh" selected>Tieng Trung</option>
                    <option value="en">Tieng Anh</option>
                    <option value="ja">Tieng Nhat</option>
                    <option value="ko">Tieng Han</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Subtitle options -->
            <div class="card">
              <div class="card-header">
                <span class="card-title" data-i18n="lbl_subtitle_opts">Phu de</span>
                <div class="card-actions">
                  <label class="toggle-wrap">
                    <input type="checkbox" class="toggle-input" id="proc-burn" checked>
                    <div class="toggle"></div>
                    <span class="toggle-label text-sm" data-i18n="lbl_burn_subs">Burn phu de</span>
                  </label>
                </div>
              </div>
              <div id="proc-burn-opts">
                <div class="check-grid mb-12">
                  <label class="check-item">
                    <input type="checkbox" id="proc-blur" checked>
                    <span data-i18n="lbl_blur_original">Lam mo text goc</span>
                  </label>
                  <label class="check-item">
                    <input type="checkbox" id="proc-translate-subs">
                    <span data-i18n="lbl_translate_subs">Dich phu de sang VI</span>
                  </label>
                  <label class="check-item">
                    <input type="checkbox" id="proc-burn-vi">
                    <span data-i18n="lbl_burn_vi_subs">Burn phu de tieng Viet</span>
                  </label>
                </div>
                <div class="grid-2">
                  <div class="field">
                    <label data-i18n="lbl_blur_zone">Vung lam mo</label>
                    <select id="proc-blur-zone">
                      <option value="bottom" selected>Duoi (Bottom)</option>
                      <option value="top">Tren (Top)</option>
                      <option value="none">Khong lam mo</option>
                    </select>
                  </div>
                  <div class="field">
                    <label data-i18n="lbl_blur_height">Chieu cao vung mo (%)</label>
                    <input type="number" id="proc-blur-height" min="5" max="40" value="15" step="1">
                  </div>
                  <div class="field">
                    <label data-i18n="lbl_font_size">Co chu phu de</label>
                    <input type="number" id="proc-font-size" min="10" max="48" value="18">
                  </div>
                  <div class="field">
                    <label data-i18n="lbl_font_color">Mau chu</label>
                    <select id="proc-font-color">
                      <option value="white" selected>Trang</option>
                      <option value="yellow">Vang</option>
                      <option value="cyan">Xanh cyan</option>
                    </select>
                  </div>
                  <div class="field">
                    <label data-i18n="lbl_margin_v">Khoang cach day (px)</label>
                    <input type="number" id="proc-margin-v" min="0" max="100" value="30">
                  </div>
                  <div class="field">
                    <label data-i18n="lbl_translate_provider">Provider dich</label>
                    <select id="proc-trans-provider">
                      <option value="auto">Auto</option>
                      <option value="deepseek">DeepSeek</option>
                      <option value="openai">OpenAI</option>
                      <option value="huggingface">HuggingFace</option>
                      <option value="google">Google</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <!-- Voice conversion -->
            <div class="card">
              <div class="card-header">
                <span class="card-title" data-i18n="lbl_voice_convert">Doi giong ZH to VI</span>
                <div class="card-actions">
                  <label class="toggle-wrap">
                    <input type="checkbox" class="toggle-input" id="proc-voice">
                    <div class="toggle"></div>
                    <span class="toggle-label text-sm" data-i18n="lbl_enable_voice">Bat</span>
                  </label>
                </div>
              </div>
              <div id="proc-voice-opts" style="display:none">
                <div class="grid-2">
                  <div class="field">
                    <label data-i18n="lbl_tts_engine">TTS Engine</label>
                    <select id="proc-tts-engine">
                      <option value="edge-tts" selected>Edge TTS (Microsoft)</option>
                      <option value="gtts">gTTS (Google)</option>
                    </select>
                  </div>
                  <div class="field">
                    <label data-i18n="lbl_tts_voice">Giong doc</label>
                    <select id="proc-tts-voice">
                      <option value="vi-VN-HoaiMyNeural">Hoai My (Nu - Mien Nam)</option>
                      <option value="vi-VN-NamMinhNeural">Nam Minh (Nam - Mien Nam)</option>
                    </select>
                  </div>
                </div>
                <div class="check-grid mb-12">
                  <label class="check-item">
                    <input type="checkbox" id="proc-keep-bg" checked>
                    <span data-i18n="lbl_keep_bg">Giu nhac nen goc</span>
                  </label>
                </div>
                <div class="field">
                  <label data-i18n="lbl_bg_volume">Am luong nhac nen (0.0 - 1.0)</label>
                  <input type="range" id="proc-bg-vol" min="0" max="1" step="0.05" value="0.15"
                    oninput="document.getElementById('proc-bg-vol-val').textContent=this.value"
                    style="width:100%;accent-color:var(--accent)">
                  <span class="text-xs text-muted" id="proc-bg-vol-val">0.15</span>
                </div>
                <div class="alert-info" style="padding:8px 12px;border-radius:6px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:#60a5fa;font-size:12px;margin-top:8px">
                  <span data-i18n="lbl_voice_note">Can: pip install edge-tts (hoac gtts). Moi doan se duoc doc bang giong Viet tai dung thoi diem.</span>
                </div>
              </div>
            </div>

            <div class="btn-group">
              <button class="btn btn-primary" id="btn-proc" onclick="startProcessVideo()" data-i18n="btn_process_video">Xu ly Video</button>
            </div>
          </div>

          <!-- Right: Progress + Log -->
          <div>
            <div class="card">
              <div class="card-header"><span class="card-title" data-i18n="lbl_progress">Tien trinh</span></div>
              <div class="progress-row">
                <span class="progress-label" data-i18n="lbl_overall">Tong the</span>
                <div class="progress-bar-wrap"><div class="progress-bar pb-overall" id="pb-proc-overall"></div></div>
                <span class="progress-pct" id="pb-proc-overall-pct">0%</span>
              </div>
              <div class="progress-info text-muted" id="lbl-proc-overall">--</div>
            </div>
            <div class="card">
              <div class="card-header">
                <span class="card-title" data-i18n="lbl_log">Nhat ky</span>
                <div class="card-actions"><button class="btn btn-secondary btn-sm" onclick="clearLog('proc-log')" data-i18n="btn_clear_log">Xoa</button></div>
              </div>
              <div class="log-box" id="proc-log" style="height:360px"></div>
            </div>

            <!-- Output info -->
            <div class="card" id="proc-result" style="display:none">
              <div class="card-header"><span class="card-title" data-i18n="lbl_output_files">File dau ra</span></div>
              <div id="proc-result-content" class="text-sm" style="line-height:1.8"></div>
            </div>
          </div>
        </div>
      </div>
