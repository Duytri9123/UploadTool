        <script>
          /* ── Batch Processing Logic ────────────────────────────────────────────── */
          window._batchQueue = [];
          window._isBatchProcessing = false;

          function _addProcTask(type) {
            const urlEl = document.getElementById('proc-url');
            const pathEl = document.getElementById('proc-video');
            const val = (type === 'url') ? urlEl.value.trim() : pathEl.value.trim();
            if (!val) { toast('Vui lòng nhập URL hoặc file', 'warning'); return; }

            const task = {
              id: 'bt-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7),
              type: type,
              val: val,
              status: 'pending',
              settings: {
                burn_subs: document.getElementById('proc-burn')?.checked ?? true,
                blur_original: document.getElementById('proc-blur-original')?.checked ?? true,
                translate_subs: document.getElementById('proc-translate-subs')?.checked ?? true,
                burn_vi_subs: document.getElementById('proc-burn-vi')?.checked ?? true,
                voice_convert: document.getElementById('proc-voice')?.checked ?? false,
                keep_bg_music: document.getElementById('proc-keep-bg')?.checked ?? false,
                font_size: parseInt(document.getElementById('proc-font-size')?.value || '32', 10),
                subtitle_position: document.getElementById('proc-sub-pos')?.value || 'bottom',
                margin_v: parseInt(document.getElementById('proc-margin-v')?.value || '20', 10),
                tts_engine: document.getElementById('proc-tts-engine')?.value || 'edge-tts',
                tts_voice: document.getElementById('proc-tts-voice')?.value || 'vi-VN-HoaiMyNeural',
                tts_speed: parseFloat(document.getElementById('proc-tts-speed')?.value || '1.0'),
                pitch_semitones: parseFloat(document.getElementById('proc-tts-pitch')?.value || '0.0'),
              }
            };
            window._batchQueue.push(task);
            if (type === 'url') urlEl.value = '';
            _renderBatchQueue();
            toast('Đã thêm vào hàng chờ!', 'success');
          }

          function _renderBatchQueue() {
            const container = document.getElementById('batch-queue-container');
            const list = document.getElementById('batch-queue-list');
            const countEl = document.getElementById('queue-count');
            if (!list) return;

            if (window._batchQueue.length === 0) { container.style.display = 'none'; return; }
            container.style.display = 'block';
            countEl.textContent = window._batchQueue.length;
            list.innerHTML = window._batchQueue.map(t => {
              const shortVal = t.val.length > 60 ? t.val.substring(0, 57) + '...' : t.val;
              return `
                <div id="${t.id}" class="batch-task-card ${t.status}">
                  <div style="flex:1">
                    <div style="font-size:13px; font-weight:600">${shortVal}</div>
                    <div style="font-size:11px; color:var(--text2)">${t.settings.tts_engine} | ${t.settings.tts_voice}</div>
                  </div>
                  <div style="font-size:10px; font-weight:700; text-transform:uppercase" class="status-lbl">${t.status}</div>
                  ${t.status === 'pending' ? `<button class="btn btn-sm" onclick="_removeBatchTask('${t.id}')">✕</button>` : ''}
                </div>
              `;
            }).join('');
          }

          function _removeBatchTask(id) {
            window._batchQueue = window._batchQueue.filter(t => t.id !== id);
            _renderBatchQueue();
          }

          async function _runBatchQueueFlow() {
            const pending = window._batchQueue.filter(t => t.status === 'pending');
            if (pending.length === 0) {
              // If nothing in queue, but there is info in inputs, add it and run
              const url = document.getElementById('proc-url')?.value?.trim();
              const file = document.getElementById('proc-video')?.value?.trim();
              if (url || file) {
                 _addProcTask(url ? 'url' : 'file');
                 setTimeout(_runBatchQueueFlow, 100);
                 return;
              }
              toast('Hàng chờ trống!', 'warning');
              return;
            }

            if (window._isBatchProcessing) return;
            window._isBatchProcessing = true;
            const btn = document.getElementById('btn-proc-main');
            if (btn) btn.disabled = true;

            for (const task of window._batchQueue) {
              if (task.status !== 'pending') continue;
              task.status = 'processing';
              _renderBatchQueue();
              document.getElementById('sec-logs').scrollIntoView({behavior:'smooth'});
              
              try {
                await _executeProcessTask(task);
                task.status = 'done';
              } catch (e) {
                task.status = 'error';
                toast('Lỗi xử lý: ' + task.val, 'error');
              }
              _renderBatchQueue();
            }

            window._isBatchProcessing = false;
            if (btn) { btn.disabled = false; btn.textContent = '✨ BẮT ĐẦU XỬ LÝ HÀNG CHỜ'; }
            toast('Đã hoàn thành tất cả task trong hàng chờ!', 'success');
          }

          async function _executeProcessTask(task) {
            const body = {
              ...task.settings,
              video_path: task.type === 'file' ? task.val : '',
              video_url: task.type === 'url' ? task.val : '',
            };
            const response = await fetch('/api/process_video', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            const logBox = document.getElementById('proc-log');
            if (logBox) logBox.innerHTML += `\n>>> ĐANG XỬ LÝ: ${task.val}\n`;

            return new Promise((resolve, reject) => {
              function pump() {
                reader.read().then(({ done, value }) => {
                  if (done) { resolve(); return; }
                  const chunk = decoder.decode(value);
                  chunk.split('\n').filter(Boolean).forEach(line => {
                    try {
                      const data = JSON.parse(line);
                      if (data.log) {
                         logBox.innerHTML += `[Task] ${data.log}\n`;
                         logBox.scrollTop = logBox.scrollHeight;
                      }
                      if (data.overall !== undefined) {
                         _setProcProgress(data.overall, data.overall_lbl);
                      }
                    } catch (e) {}
                  });
                  pump();
                }).catch(reject);
              }
              pump();
            });
          }
        </script>
