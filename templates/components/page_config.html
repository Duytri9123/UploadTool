      <div id="page-config" class="page">
        <style>
          .cfg-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding-bottom: 60px;
          }
          
          /* Quick Navigation bar on top */
          .cfg-nav-top {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
          }
          .cfg-btn-nav {
            padding: 8px 16px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
          }
          .cfg-btn-nav:hover {
            background: var(--bg3);
            border-color: var(--accent);
            color: var(--text);
          }
          
          /* Sections */
          .cfg-section {
            margin-bottom: 40px;
            animation: fadeIn 0.5s ease;
          }
          .cfg-section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent);
            width: fit-content;
          }
          .cfg-section-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
          }
          .cfg-section-icon { font-size: 1.5rem; }

          /* Sticky Footer Save Button */
          .cfg-footer {
            position: sticky;
            bottom: 20px;
            display: flex;
            justify-content: flex-end;
            pointer-events: none;
            z-index: 110;
          }
          .btn-save-sticky {
            pointer-events: auto;
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            background: var(--accent);
            color: white;
            box-shadow: 0 8px 25px rgba(108,99,255,0.4);
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
          }
          .btn-save-sticky:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(108,99,255,0.6); }
        </style>

        <div class="cfg-wrapper">
          <!-- NAVIGATION JUMPERS -->
          <div class="cfg-nav-top">
            <button class="cfg-btn-nav active" onclick="switchConfigTab(this, 'cfg-sec-general')">⚙️ <span data-i18n="cfg_tab_general">Cấu hình chung</span></button>
            <button class="cfg-btn-nav" onclick="switchConfigTab(this, 'cfg-sec-process')">🎬 <span data-i18n="cfg_tab_process">Xử lý Video</span></button>
            <button class="cfg-btn-nav" onclick="switchConfigTab(this, 'cfg-sec-afp')">🛡️ <span data-i18n="cfg_tab_afp">Bảo mật & AFP</span></button>
            <button class="cfg-btn-nav" onclick="switchConfigTab(this, 'cfg-sec-integration')">🌍 <span data-i18n="cfg_tab_integration">Dịch & Đăng tải</span></button>
          </div>

          <!-- SECTION 1: GENERAL -->
          <section id="cfg-sec-general" class="cfg-section">
            <div class="cfg-section-header">
              <span class="cfg-section-icon">⚙️</span>
              <span class="cfg-section-title" data-i18n="cfg_tab_general">Cấu hình hệ thống</span>
            </div>
            
            <div class="card">
              <div class="card-header"><span class="card-title">Lưu trữ & Luồng</span></div>
              <div class="field">
                 <label data-i18n="lbl_save_path">Thư mục lưu video mặc định</label>
                 <div class="flex gap-8">
                   <input type="text" id="cfg-path" placeholder="./Downloaded" style="flex:1">
                 </div>
              </div>
              <div class="grid-3 gap-16">
                 <div class="field"><label data-i18n="lbl_threads">Số luồng tải</label><input type="number" id="cfg-threads" value="4"></div>
                 <div class="field"><label data-i18n="lbl_retries">Số lần thử lại</label><input type="number" id="cfg-retries" value="3"></div>
                 <div class="field"><label>Timeout (s)</label><input type="number" id="cfg-timeout" value="30"></div>
              </div>
            </div>

            <div class="card mt-20">
              <div class="card-header"><span class="card-title">Tùy chọn tải về (Download Options)</span></div>
              <div class="check-grid">
                <label class="check-item"><input type="checkbox" id="cfg-dl-video" checked><span data-i18n="lbl_filter_video">Tải Video</span></label>
                <label class="check-item"><input type="checkbox" id="cfg-dl-music" checked><span data-i18n="lbl_music">Tải Nhạc nền</span></label>
                <label class="check-item"><input type="checkbox" id="cfg-dl-cover" checked><span data-i18n="lbl_cover">Tải Ảnh bìa</span></label>
                <label class="check-item"><input type="checkbox" id="cfg-dl-json" checked><span data-i18n="lbl_json">Lưu Metadata (JSON)</span></label>
                <label class="check-item"><input type="checkbox" id="cfg-dl-folder" checked><span data-i18n="lbl_folder">Tạo thư mục riêng</span></label>
              </div>
            </div>
          </section>

          <!-- SECTION 2: VIDEO PROCESSING -->
          <section id="cfg-sec-process" class="cfg-section">
            <div class="cfg-section-header">
              <span class="cfg-section-icon">🎬</span>
              <span class="cfg-section-title" data-i18n="cfg_tab_process">Xử lý Video tự động</span>
            </div>
            <div class="card">
              <div class="section-title mb-12">Phụ đề & Dịch thuật</div>
              <div class="grid-2 gap-20">
                 <div class="field"><label data-i18n="lbl_transcribe_provider">Công cụ Phiên âm</label><select id="cfg-tr-provider"><option value="groq">Groq Whisper (Siêu nhanh)</option><option value="whisper-local">Whisper Local (Máy tính)</option></select></div>
                 <div class="field"><label data-i18n="lbl_translate_provider">Công cụ Dịch thuật</label><select id="cfg-trans-provider"><option value="deepseek">DeepSeek AI</option><option value="openai">OpenAI GPT</option><option value="google">Google Translate</option></select></div>
              </div>
              <div class="field mt-12"><label data-i18n="lbl_groq_api_key">Groq API Key</label><input type="password" id="cfg-groq-key" placeholder="gsk_..."></div>
              <div class="field mt-12"><label data-i18n="lbl_deepseek_api_key">DeepSeek API Key</label><input type="password" id="cfg-deepseek-key" placeholder="sk-..."></div>
            </div>
          </section>

          <!-- SECTION 3: ANTI-FINGERPRINT -->
          <section id="cfg-sec-afp" class="cfg-section">
            <div class="cfg-section-header">
              <span class="cfg-section-icon">🛡️</span>
              <span class="cfg-section-title" data-i18n="cfg_tab_afp">Bảo mật & Tránh quét (AFP)</span>
            </div>
            <div class="card">
              <label class="check-item mb-16"><input type="checkbox" id="cfg-afp-enabled"><strong>Kích hoạt bộ lọc Anti-Fingerprint (Lách luật nội dung)</strong></label>
              <div class="grid-2 gap-20">
                <div class="field"><label>Brightness (-1.0 to 1.0)</label><input type="number" id="cfg-afp-brightness" value="0.02" step="0.01"></div>
                <div class="field"><label>Contrast (0.5 to 2.0)</label><input type="number" id="cfg-afp-contrast" value="1.05" step="0.01"></div>
                <div class="field"><label>Saturation (0.0 to 3.0)</label><input type="number" id="cfg-afp-saturation" value="1.1" step="0.01"></div>
                <div class="field"><label>Sharpness (0.0 to 5.0)</label><input type="number" id="cfg-afp-sharpness" value="0.5" step="0.01"></div>
              </div>
              <hr class="divider">
              <div class="check-grid">
                <label class="check-item"><input type="checkbox" id="cfg-afp-flip"><span>Lật ngang video (Flip)</span></label>
                <label class="check-item"><input type="checkbox" id="cfg-afp-vignette"><span>Thêm viền tối (Vignette)</span></label>
              </div>
            </div>
          </section>

          <!-- SECTION 4: INTEGRATION -->
          <section id="cfg-sec-integration" class="cfg-section">
            <div class="cfg-section-header">
              <span class="cfg-section-icon">🌍</span>
              <span class="cfg-section-title" data-i18n="cfg_tab_integration">Đăng tải & Tích hợp</span>
            </div>
            <div class="card">
              <div class="field"><label>Proxy hệ thống (Nếu cần)</label><input type="text" id="cfg-proxy" placeholder="http://user:pass@host:port"></div>
              <div class="grid-2 gap-20 mt-12">
                <div class="field"><label>YouTube Client Secrets</label><input type="text" id="cfg-yt-secrets" placeholder="client_secrets.json"></div>
                <div class="field"><label>TikTok App Key</label><input type="password" id="cfg-tt-key"></div>
              </div>
            </div>
          </section>

          <!-- STICKY FOOTER SAVE -->
          <div class="cfg-footer">
            <button class="btn-save-sticky" onclick="saveConfig()">
              💾 <span data-i18n="btn_save_config">Lưu toàn bộ cấu hình</span>
            </button>
          </div>
        </div>
      </div>
