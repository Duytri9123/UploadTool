      <!-- PAGE: CONFIG -->
      <div id="page-config" class="page">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start">
          <div>
            <div class="card">
              <div class="card-header"><span class="card-title" data-i18n="lbl_dl_settings">Cài đặt tải xuống</span></div>
              <div class="field">
                <label data-i18n="lbl_urls">Danh sách URL</label>
                <textarea id="cfg-urls" style="min-height:100px" placeholder="https://www.douyin.com/user/..."></textarea>
              </div>
              <div class="grid-2">
                <div class="field"><label data-i18n="lbl_save_path">Thư mục lưu</label><input type="text" id="cfg-path" placeholder="./Downloaded/"></div>
                <div class="field"><label data-i18n="lbl_proxy">Proxy</label><input type="text" id="cfg-proxy" placeholder="http://127.0.0.1:7890"></div>
                <div class="field"><label data-i18n="lbl_threads">Luồng</label><input type="number" id="cfg-thread" min="1" max="20" value="5"></div>
                <div class="field"><label data-i18n="lbl_retries">Thử lại</label><input type="number" id="cfg-retry" min="0" max="10" value="3"></div>
                <div class="field"><label data-i18n="lbl_start_date">Ngày bắt đầu</label><input type="text" id="cfg-start" placeholder="2024-01-01"></div>
                <div class="field"><label data-i18n="lbl_end_date">Ngày kết thúc</label><input type="text" id="cfg-end" placeholder="2025-12-31"></div>
              </div>
            </div>
            <div class="card">
              <div class="card-header"><span class="card-title" data-i18n="lbl_dl_modes">Chế độ tải</span></div>
              <div class="check-grid" id="mode-checks">
                <label class="check-item"><input type="checkbox" value="post" checked><span>Post</span></label>
                <label class="check-item"><input type="checkbox" value="like"><span>Like</span></label>
                <label class="check-item"><input type="checkbox" value="collect"><span>Collect</span></label>
                <label class="check-item"><input type="checkbox" value="music"><span>Music</span></label>
                <label class="check-item"><input type="checkbox" value="mix"><span>Mix</span></label>
                <label class="check-item"><input type="checkbox" value="collectmix"><span>CollectMix</span></label>
              </div>
              <hr class="divider">
              <div class="section-title" data-i18n="lbl_max_items">Số lượng tối đa</div>
              <div class="grid-3">
                <div class="field"><label>Post</label><input type="number" id="n-post" min="0" value="0"></div>
                <div class="field"><label>Like</label><input type="number" id="n-like" min="0" value="0"></div>
                <div class="field"><label>Collect</label><input type="number" id="n-collect" min="0" value="0"></div>
                <div class="field"><label>Music</label><input type="number" id="n-music" min="0" value="0"></div>
                <div class="field"><label>Mix</label><input type="number" id="n-mix" min="0" value="0"></div>
                <div class="field"><label>CollectMix</label><input type="number" id="n-collectmix" min="0" value="0"></div>
              </div>
            </div>
          </div>
          <div>
            <div class="card">
              <div class="card-header"><span class="card-title" data-i18n="lbl_options">Tùy chọn</span></div>
              <div class="check-grid">
                <label class="check-item"><input type="checkbox" id="opt-music"><span data-i18n="lbl_music">Nhạc</span></label>
                <label class="check-item"><input type="checkbox" id="opt-cover"><span data-i18n="lbl_cover">Ảnh bìa</span></label>
                <label class="check-item"><input type="checkbox" id="opt-json"><span>JSON</span></label>
                <label class="check-item"><input type="checkbox" id="opt-folder"><span data-i18n="lbl_folder">Thư mục</span></label>
              </div>
            </div>
            <div class="card">
              <div class="card-header"><span class="card-title" data-i18n="lbl_translation">Dịch thuật</span></div>
              <div class="status-bar mb-12" id="translate-status">
                <span class="dot dot-yellow"></span><span data-i18n="lbl_loading">Loading...</span>
              </div>
              <div class="field">
                <label data-i18n="lbl_preferred_provider">Provider ưu tiên</label>
                <select id="cfg-preferred-provider">
                  <option value="auto" data-i18n="opt_auto_fallback">Auto (Fallback)</option>
                  <option value="deepseek">DeepSeek</option>
                  <option value="openai">OpenAI</option>
                  <option value="huggingface">HuggingFace</option>
                  <option value="google">Google Translate</option>
                </select>
              </div>
              <div class="field"><label data-i18n="lbl_deepseek_api_key">DeepSeek API Key</label><input type="password" id="cfg-deepseek-key" placeholder="sk-..."></div>
              <div class="field"><label data-i18n="lbl_openai_api_key">OpenAI API Key</label><input type="password" id="cfg-openai-key" placeholder="sk-..."></div>
              <div class="field"><label data-i18n="lbl_hf_token">HuggingFace Token</label><input type="password" id="cfg-hf-token" placeholder="hf_..."></div>
              <div class="check-grid">
                <label class="check-item"><input type="checkbox" id="cfg-naming-enabled"><span>Dùng title đã dịch cho tên file</span></label>
              </div>
            </div>
            <div class="card">
              <div class="card-header"><span class="card-title">Đăng tải</span></div>
              <div class="grid-2">
                <div class="field">
                  <label>Nền tảng mặc định</label>
                  <select id="cfg-upload-platform">
                    <option value="youtube">YouTube</option>
                    <option value="tiktok">TikTok</option>
                  </select>
                </div>
                <div class="field" style="display:flex;align-items:center;gap:8px;padding-top:20px">
                  <label class="check-item"><input type="checkbox" id="cfg-upload-auto"><span>Tự động mở luồng đăng sau xử lý</span></label>
                </div>
              </div>
              <div class="grid-2">
                <div class="field"><label>YouTube title template</label><input type="text" id="cfg-yt-title-template" placeholder="{title}"></div>
                <div class="field"><label>YouTube privacy</label><select id="cfg-yt-privacy"><option value="private">Private</option><option value="unlisted">Unlisted</option><option value="public">Public</option></select></div>
                <div class="field"><label>TikTok title template</label><input type="text" id="cfg-tt-title-template" placeholder="{title}"></div>
                <div class="field"><label>TikTok privacy</label><select id="cfg-tt-privacy"><option value="private">Private</option><option value="friends">Friends</option><option value="public">Public</option></select></div>
              </div>
              <div class="grid-2">
                <div class="field"><label>YouTube description template</label><textarea id="cfg-yt-desc-template" style="min-height:72px" placeholder="{title}"></textarea></div>
                <div class="field"><label>TikTok caption template</label><textarea id="cfg-tt-caption-template" style="min-height:72px" placeholder="{title}"></textarea></div>
              </div>
            </div>
            <!-- Video Process Config -->
            <div class="card">
              <div class="card-header">
                <span class="card-title" data-i18n="lbl_vp_title">Xu ly video sau khi tai</span>
                <div class="card-actions">
                  <label class="toggle-wrap">
                    <input type="checkbox" class="toggle-input" id="vp-enabled" checked>
                    <div class="toggle"></div>
                    <span class="toggle-label text-sm" data-i18n="lbl_enable">Bat</span>
                  </label>
                </div>
              </div>
              <div id="vp-opts">
                <div class="grid-2">
                  <div class="field">
                    <label data-i18n="lbl_model">Mo hinh Whisper</label>
                    <select id="vp-model">
                      <option value="tiny">tiny</option>
                      <option value="base">base</option>
                      <option value="small" selected>small</option>
                      <option value="medium">medium</option>
                      <option value="large">large</option>
                    </select>
                  </div>
                  <div class="field">
                    <label data-i18n="lbl_source_language">Ngon ngu goc</label>
                    <select id="vp-lang">
                      <option value="zh" selected data-i18n="opt_lang_zh">Tieng Trung</option>
                      <option value="en" data-i18n="opt_lang_en">Tieng Anh</option>
                      <option value="ja" data-i18n="opt_lang_ja">Tieng Nhat</option>
                      <option value="ko" data-i18n="opt_lang_ko">Tieng Han</option>
                    </select>
                  </div>
                </div>
                <div class="check-grid mb-12">
                  <label class="check-item"><input type="checkbox" id="vp-burn"><span data-i18n="lbl_burn_subs">Burn phụ đề</span></label>
                  <label class="check-item"><input type="checkbox" id="vp-translate" checked><span data-i18n="lbl_translate_subs">Dịch sang VI</span></label>
                  <label class="check-item"><input type="checkbox" id="vp-burn-vi"><span data-i18n="lbl_burn_vi_subs">Burn phụ đề VI</span></label>
                  <label class="check-item"><input type="checkbox" id="vp-voice" checked><span data-i18n="lbl_voice_convert">Đổi giọng VI</span></label>
                  <label class="check-item"><input type="checkbox" id="vp-keep-bg"><span data-i18n="lbl_keep_bg">Giữ nhạc nền</span></label>
                </div>
                <div class="grid-2">
                  <div class="field">
                    <label data-i18n="lbl_tts_voice">Giọng đọc</label>
                    <select id="vp-tts-voice">
                      <option value="vi-VN-HoaiMyNeural">Hoai My (Nữ)</option>
                      <option value="vi-VN-NamMinhNeural">Nam Minh (Nam)</option>
                    </select>
                  </div>
                  <div class="field">
                    <label data-i18n="lbl_font_size">Cỡ chữ phụ đề</label>
                    <input type="number" id="vp-font-size" min="10" max="72" value="32">
                  </div>
                  <div class="field" style="display:flex;align-items:center;gap:8px;padding-top:20px">
                    <label class="check-item">
                      <input type="checkbox" id="vp-blur-original" checked>
                      <span data-i18n="lbl_blur_original">Che phụ đề gốc</span>
                    </label>
                  </div>
                  </div>
                </div>
                <div class="alert-info" style="margin-top:8px">
                  <span data-i18n="lbl_vp_note">Can: pip install openai-whisper edge-tts. Video se duoc xu ly ngay sau khi tai xong.</span>
                </div>
              </div>
            </div>
            <div class="btn-group">
              <button class="btn btn-primary" onclick="saveConfig()" data-i18n="btn_save_config">Lưu cấu hình</button>
              <button class="btn btn-secondary" onclick="loadConfig()" data-i18n="btn_reload">Tải lại</button>
            </div>
          </div>
        </div>
      </div>
